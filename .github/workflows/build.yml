name: Build Windows EXE

on:
  push:
    branches:
      - main

  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      # Checkout repository
      - name: Checkout
        uses: actions/checkout@v6

      # Install Python
      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      # Install dependencies
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # Build executable
      - name: Build EXE
        run: |
          pyinstaller --onefile --windowed --name UnderwaterRayTracer main.py

      # Upload artifact
      - name: Upload EXE
        uses: actions/upload-artifact@v7
        with:
          name: UnderwaterRayTracer-Windows
          path: dist/UnderwaterRayTracer.exe
          overwrite: true
          archive: false